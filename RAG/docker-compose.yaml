services: # configure secrets from .env for local
  rstn-misr-rag-codebase:
    image: rstn-misr-rag-codebase:${IMAGE_TAG:-latest}
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rstn-misr-rag-codebase
    ports:
      - "127.0.0.1:9001:9001"
    env_file:
      - .env
    environment:
      ETL_FALKOR_HOST: falkordb-local
      ETL_FALKOR_PORT: 6379

    networks:
      - shared_net

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 750M

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request,sys;sys.exit(0 if json.load(urllib.request.urlopen('http://localhost:9001/health'))['status']=='ok' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  shared_net:
    external: true
    name: freelance_p-01_cuisine-menu-recommendation-app_default
