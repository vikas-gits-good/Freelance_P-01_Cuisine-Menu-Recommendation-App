services:
  rstn-misr-fe-codebase:
    image: rstn-misr-fe-codebase:${IMAGE_TAG:-latest}
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rstn-misr-fe-codebase
    ports:
      - "127.0.0.1:11001:11001"
      - "127.0.0.1:10001:10001"
    env_file:
      - .env
    environment:
      - RAG_API_URL=http://rstn-misr-rag-codebase:9001
    networks:
      - shared_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  shared_net:
    external: true
    name: freelance_p-01_cuisine-menu-recommendation-app_default
